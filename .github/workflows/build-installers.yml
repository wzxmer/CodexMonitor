name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows installers
            os: windows-latest
            rust_target: ""
            command: npm run tauri:build:win
            artifact: windows-installers
            optional: false
            paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS Apple Silicon installers
            os: macos-latest
            rust_target: aarch64-apple-darwin
            command: npm run tauri -- build --target aarch64-apple-darwin --bundles dmg
            artifact: macos-aarch64-installers
            optional: false
            paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macOS Intel installers
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
            command: npm run tauri -- build --target x86_64-apple-darwin --bundles dmg
            artifact: macos-x86_64-installers
            optional: false
            paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: Linux installers
            os: ubuntu-24.04
            rust_target: ""
            command: |
              set -o pipefail
              NO_STRIP=1 npm run tauri -- build --config src-tauri/tauri.linux.conf.json --bundles appimage,rpm 2>&1 | tee tauri-linux-build.log
            artifact: linux-installers
            optional: false
            paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage*
              src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            clang \
            libclang-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libfuse2 \
            dpkg-dev \
            fakeroot \
            patchelf \
            rpm \
            xdg-utils \
            pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: command -v cmake >/dev/null 2>&1 || brew install cmake

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cmake = Get-Command cmake.exe -ErrorAction SilentlyContinue
          $clang = Get-Command clang.exe -ErrorAction SilentlyContinue
          $clangPath = 'C:\Program Files\LLVM\bin\clang.exe'
          if ($cmake -and ($clang -or (Test-Path -LiteralPath $clangPath))) {
            Write-Host 'CMake and LLVM are already available on the hosted runner.'
            exit 0
          }
          choco install cmake llvm -y --no-progress

      - name: Configure LLVM on Windows
        if: runner.os == 'Windows'
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installer
        id: build-installer
        continue-on-error: ${{ matrix.optional }}
        run: ${{ matrix.command }}

      - name: List bundle outputs
        if: always()
        shell: bash
        run: find src-tauri/target/release/bundle -maxdepth 3 -type f -print || true

      - name: Upload installers
        if: steps.build-installer.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

      - name: Upload Linux build log
        if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-log
          path: tauri-linux-build.log
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Build recommended download links
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -v "^${GITHUB_REF_NAME}$" \
            | head -n 1 || true)
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..${GITHUB_SHA}" --pretty=format:"%s" > release-commits.txt
          else
            git log "${GITHUB_SHA}" --pretty=format:"%s" > release-commits.txt
          fi
          python3 scripts/build_release_notes.py \
            --artifacts-dir release-artifacts \
            --repository "$GITHUB_REPOSITORY" \
            --version "$VERSION" \
            --commits-file release-commits.txt \
            --output release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          body_path: release-notes.md
          overwrite_files: true
