name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows installers
            os: windows-latest
            command: npm run tauri -- build --config src-tauri/tauri.windows.conf.json
            artifact: windows-installers
            optional: false
            paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS installers
            os: macos-latest
            command: npm run tauri -- build --bundles dmg
            artifact: macos-installers
            optional: false
            paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux installers
            os: ubuntu-24.04
            command: npm run tauri -- build --config src-tauri/tauri.linux.conf.json --bundles deb
            artifact: linux-installers
            optional: false
            paths: |
              src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            clang \
            libclang-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libfuse2 \
            dpkg-dev \
            fakeroot \
            patchelf \
            rpm \
            xdg-utils \
            pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: command -v cmake >/dev/null 2>&1 || brew install cmake

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install cmake llvm -y --no-progress

      - name: Configure LLVM on Windows
        if: runner.os == 'Windows'
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installer
        id: build-installer
        continue-on-error: ${{ matrix.optional }}
        run: ${{ matrix.command }}

      - name: List bundle outputs
        if: always()
        shell: bash
        run: find src-tauri/target/release/bundle -maxdepth 3 -type f -print || true

      - name: Upload installers
        if: steps.build-installer.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          overwrite_files: true
