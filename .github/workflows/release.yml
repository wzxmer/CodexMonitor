name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          current = json.loads(Path("src-tauri/tauri.conf.json").read_text())["version"]

          def parse(version):
              parts = version.split(".")
              if len(parts) != 3:
                  raise SystemExit(f"Expected version like 0.X.Y, got {version}")
              return tuple(int(part) for part in parts)

          current_tuple = parse(current)
          tags = subprocess.check_output(
              ["git", "tag", "--list", "v[0-9]*.[0-9]*.[0-9]*"],
              text=True,
          ).splitlines()

          released = []
          for tag in tags:
              match = re.fullmatch(r"v(\d+\.\d+\.\d+)", tag.strip())
              if match:
                  released.append(parse(match.group(1)))

          if released:
              latest = max(released)
              if current_tuple <= latest:
                  current_tuple = (latest[0], latest[1], latest[2] + 1)

          print(".".join(str(part) for part in current_tuple))
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${VERSION}"

  build_macos:
    runs-on: macos-latest
    needs: prepare_release
    environment: release
    env:
      RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply release version
        run: |
          set -euo pipefail
          python3 - <<PY
          import json
          from pathlib import Path

          for filename in ("package.json", "package-lock.json"):
              path = Path(filename)
              data = json.loads(path.read_text())
              data["version"] = "$RELEASE_VERSION"
              if filename == "package-lock.json":
                  data["packages"][""]["version"] = "$RELEASE_VERSION"
              path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$RELEASE_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$RELEASE_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "codex-monitor"\nversion = ")[^"]+(")',
            r'\g<1>$RELEASE_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update codex-monitor version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

          python3 - <<PY
          import plistlib
          from pathlib import Path

          path = Path("src-tauri/gen/apple/codex-monitor_iOS/Info.plist")
          with path.open("rb") as f:
            data = plistlib.load(f)

          data["CFBundleShortVersionString"] = "$RELEASE_VERSION"
          data["CFBundleVersion"] = "$RELEASE_VERSION"

          with path.open("wb") as f:
            plistlib.dump(data, f, sort_keys=False)
          PY

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install CMake
        run: brew install cmake

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: |
          set -euo pipefail
          npm run tauri -- build --config src-tauri/tauri.macos.conf.json --bundles app

      - name: Build daemon binaries
        run: |
          set -euo pipefail
          cd src-tauri
          cargo build --release --bin codex_monitor_daemon --bin codex_monitor_daemonctl

      - name: Package artifacts
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          mkdir -p release-artifacts release-artifacts/dmg-root
          rm -rf "release-artifacts/dmg-root/Codex Monitor.app"
          ditto "src-tauri/target/release/bundle/macos/Codex Monitor.app" \
            "release-artifacts/dmg-root/Codex Monitor.app"

          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/Codex Monitor.app" \
            release-artifacts/CodexMonitor.zip

          hdiutil create -volname "Codex Monitor" \
            -srcfolder release-artifacts/dmg-root \
            -ov -format UDZO \
            release-artifacts/CodexMonitor_${VERSION}_aarch64.dmg

          COPYFILE_DISABLE=1 tar -czf \
            "src-tauri/target/release/bundle/macos/Codex Monitor.app.tar.gz" \
            -C src-tauri/target/release/bundle/macos "Codex Monitor.app"

          cp "src-tauri/target/release/bundle/macos/Codex Monitor.app.tar.gz" \
            release-artifacts/CodexMonitor.app.tar.gz

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            release-artifacts/CodexMonitor.zip
            release-artifacts/CodexMonitor_*_aarch64.dmg
            release-artifacts/CodexMonitor.app.tar.gz

  build_linux:
    name: linux bundles (${{ matrix.arch }})
    runs-on: ${{ matrix.platform }}
    needs: prepare_release
    environment: release
    env:
      RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            arch: x86_64
          - platform: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (linux only)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils libasound2-dev rpm

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Apply release version
        run: |
          set -euo pipefail
          python3 - <<PY
          import json
          from pathlib import Path

          for filename in ("package.json", "package-lock.json"):
              path = Path(filename)
              data = json.loads(path.read_text())
              data["version"] = "$RELEASE_VERSION"
              if filename == "package-lock.json":
                  data["packages"][""]["version"] = "$RELEASE_VERSION"
              path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$RELEASE_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$RELEASE_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "codex-monitor"\nversion = ")[^"]+(")',
            r'\g<1>$RELEASE_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update codex-monitor version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      - name: build AppImage and RPM
        run: |
          set -euo pipefail
          npm run tauri -- build --config src-tauri/tauri.linux.conf.json --bundles appimage,rpm

      - name: Validate Linux bundle outputs
        run: |
          set -euo pipefail
          mapfile -t appimages < <(find src-tauri/target/release/bundle/appimage -type f -name '*.AppImage*' | sort)
          mapfile -t rpms < <(find src-tauri/target/release/bundle/rpm -type f -name '*.rpm' | sort)
          if [ ${#appimages[@]} -eq 0 ]; then
            echo "No AppImage output found"
            exit 1
          fi
          if [ ${#rpms[@]} -eq 0 ]; then
            echo "No RPM output found"
            exit 1
          fi

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage*
            src-tauri/target/release/bundle/rpm/*.rpm

  build_windows:
    runs-on: windows-latest
    needs: prepare_release
    environment: release
    env:
      RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Apply release version
        shell: bash
        run: |
          set -euo pipefail
          python - <<PY
          import json
          from pathlib import Path

          for filename in ("package.json", "package-lock.json"):
              path = Path(filename)
              data = json.loads(path.read_text())
              data["version"] = "$RELEASE_VERSION"
              if filename == "package-lock.json":
                  data["packages"][""]["version"] = "$RELEASE_VERSION"
              path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$RELEASE_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$RELEASE_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "codex-monitor"\nversion = ")[^"]+(")',
            r'\g<1>$RELEASE_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update codex-monitor version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install LLVM (bindgen)
        run: choco install llvm -y --no-progress

      - name: Configure LLVM (bindgen)
        run: |
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_ENV
          echo "C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_PATH

      - name: install frontend dependencies
        run: npm ci

      - name: build windows bundles
        shell: bash
        run: |
          set -euo pipefail
          npm run tauri:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe*
            src-tauri/target/release/bundle/msi/*.msi*

  release:
    runs-on: ubuntu-latest
    environment: release
    needs:
      - prepare_release
      - build_macos
      - build_linux
      - build_windows
    env:
      RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply release version
        run: |
          set -euo pipefail
          python3 - <<PY
          import json
          from pathlib import Path

          for filename in ("package.json", "package-lock.json"):
              path = Path(filename)
              data = json.loads(path.read_text())
              data["version"] = "$RELEASE_VERSION"
              if filename == "package-lock.json":
                  data["packages"][""]["version"] = "$RELEASE_VERSION"
              path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$RELEASE_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$RELEASE_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "codex-monitor"\nversion = ")[^"]+(")',
            r'\g<1>$RELEASE_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update codex-monitor version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

          python3 - <<PY
          import plistlib
          from pathlib import Path

          path = Path("src-tauri/gen/apple/codex-monitor_iOS/Info.plist")
          with path.open("rb") as f:
            data = plistlib.load(f)

          data["CFBundleShortVersionString"] = "$RELEASE_VERSION"
          data["CFBundleVersion"] = "$RELEASE_VERSION"

          with path.open("wb") as f:
            plistlib.dump(data, f, sort_keys=False)
          PY

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: release-artifacts

      - name: Download Linux bundles
        uses: actions/download-artifact@v4
        with:
          pattern: linux-bundles-*
          path: release-artifacts
          merge-multiple: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts

      - name: Normalize release artifact filenames
        run: |
          set -euo pipefail
          while IFS= read -r -d '' artifact; do
            dir=$(dirname "$artifact")
            file=$(basename "$artifact")
            normalized="${file// /.}"
            if [ "$file" = "$normalized" ]; then
              continue
            fi
            target="${dir}/${normalized}"
            if [ -e "$target" ]; then
              echo "Cannot normalize filename because target already exists: $target"
              exit 1
            fi
            echo "Renaming $artifact -> $target"
            mv "$artifact" "$target"
          done < <(find release-artifacts -type f -name '* *' -print0)

      - name: Validate RPM artifacts
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rpm
          mapfile -t rpms < <(find release-artifacts -type f -name '*.rpm' | sort)
          if [ ${#rpms[@]} -eq 0 ]; then
            echo "No RPM artifacts found"
            find release-artifacts -type f | sort
            exit 1
          fi
          for rpm_file in "${rpms[@]}"; do
            rpm -qip "$rpm_file"
            rpm -qp --requires "$rpm_file"
          done

      - name: Build release notes
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -v "^v${VERSION}$" \
            | head -n 1 || true)
          RANGE_END="${GITHUB_SHA}"
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          else
            git log "${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          fi

          python3 - <<'PY'
          import re
          from pathlib import Path

          lines = Path("release-artifacts/release-commits.txt").read_text().splitlines()
          pattern = re.compile(r"^(feat|fix|perf)(?:\([^)]*\))?:\s*(.+)$", re.IGNORECASE)
          groups = {"feat": [], "fix": [], "perf": []}
          for line in lines:
              match = pattern.match(line.strip())
              if not match:
                  continue
              kind = match.group(1).lower()
              message = match.group(2).strip()
              if message:
                  groups[kind].append(message)

          sections = [
              ("## New Features", "feat"),
              ("## Fixes", "fix"),
              ("## Performance Improvements", "perf"),
          ]
          output = []
          for title, key in sections:
              items = groups[key]
              if not items:
                  continue
              output.append(title)
              output.extend([f"- {item}" for item in items])
              output.append("")

          notes = "\n".join(output).strip()
          if not notes:
              notes = "- No user-facing changes."

          Path("release-artifacts/release-notes.md").write_text(notes + "\n")
          PY

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          shopt -s nullglob globstar
          appimages=(release-artifacts/**/*.AppImage*)
          mapfile -t rpms < <(find release-artifacts -type f -name '*.rpm' | sort)
          mapfile -t windows_exes < <(find release-artifacts -type f -name '*.exe*' | sort)
          mapfile -t windows_msis < <(find release-artifacts -type f -name '*.msi*' | sort)
          if [ ${#rpms[@]} -eq 0 ]; then
            echo "No RPM artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          if [ ${#windows_exes[@]} -eq 0 ]; then
            echo "No Windows .exe artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          if [ ${#windows_msis[@]} -eq 0 ]; then
            echo "No Windows .msi artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-artifacts/release-notes.md \
            --target "$GITHUB_SHA" \
            release-artifacts/CodexMonitor.zip \
            release-artifacts/CodexMonitor_*_aarch64.dmg \
            release-artifacts/CodexMonitor.app.tar.gz \
            "${appimages[@]}" \
            "${rpms[@]}" \
            "${windows_exes[@]}" \
            "${windows_msis[@]}"

      - name: Bump version and open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          NEXT_VERSION=$(python3 - <<'PY' "$VERSION"
          import sys

          version = sys.argv[1]
          parts = version.split(".")
          if len(parts) != 3:
              raise SystemExit("Expected version like 0.X.Y")

          major, minor, patch = (int(p) for p in parts)
          print(f"{major}.{minor}.{patch + 1}")
          PY
          )

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          python3 - <<PY
          import json
          from pathlib import Path

          for filename in ("package.json", "package-lock.json"):
              path = Path(filename)
              data = json.loads(path.read_text())
              data["version"] = "$NEXT_VERSION"
              if filename == "package-lock.json":
                  data["packages"][""]["version"] = "$NEXT_VERSION"
              path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$NEXT_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$NEXT_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "codex-monitor"\nversion = ")[^"]+(")',
            r'\g<1>$NEXT_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update codex-monitor version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

          python3 - <<PY
          import plistlib
          from pathlib import Path

          path = Path("src-tauri/gen/apple/codex-monitor_iOS/Info.plist")
          with path.open("rb") as f:
            data = plistlib.load(f)

          data["CFBundleShortVersionString"] = "$NEXT_VERSION"
          data["CFBundleVersion"] = "$NEXT_VERSION"

          with path.open("wb") as f:
            plistlib.dump(data, f, sort_keys=False)
          PY

          git checkout -b "chore/bump-version-${NEXT_VERSION}"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json src-tauri/gen/apple/codex-monitor_iOS/Info.plist
          git commit -m "chore: bump version to ${NEXT_VERSION}"
          git push origin "chore/bump-version-${NEXT_VERSION}"

          gh pr create \
            --title "chore: bump version to ${NEXT_VERSION}" \
            --body "Post-release version bump to ${NEXT_VERSION}." \
            --base main \
            --head "chore/bump-version-${NEXT_VERSION}" || \
            echo "Unable to create version bump PR; branch chore/bump-version-${NEXT_VERSION} was pushed."
