name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_label_version: ${{ steps.version.outputs.release_label_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          python3 scripts/resolve_release_version.py \
            --config src-tauri/tauri.conf.json \
            --github-output "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"

  build_macos:
    name: macOS bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.platform }}
    needs: prepare_release
    environment: release
    env:
      RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
      VITE_TENCENT_UPDATE_MANIFEST_URL: ${{ vars.TENCENT_UPDATE_MANIFEST_URL }}
      VITE_ALIYUN_UPDATE_MANIFEST_URL: ${{ vars.ALIYUN_UPDATE_MANIFEST_URL }}
      THREADFLEET_TENCENT_UPDATE_BASE_URL: ${{ vars.TENCENT_UPDATE_BASE_URL }}
      THREADFLEET_ALIYUN_UPDATE_BASE_URL: ${{ vars.ALIYUN_UPDATE_BASE_URL }}
      VITE_TENCENT_CODEX_CLI_MANIFEST_URL: ${{ vars.TENCENT_CODEX_CLI_MANIFEST_URL }}
      VITE_ALIYUN_CODEX_CLI_MANIFEST_URL: ${{ vars.ALIYUN_CODEX_CLI_MANIFEST_URL }}
      THREADFLEET_TENCENT_CODEX_CLI_BASE_URL: ${{ vars.TENCENT_CODEX_CLI_BASE_URL }}
      THREADFLEET_ALIYUN_CODEX_CLI_BASE_URL: ${{ vars.ALIYUN_CODEX_CLI_BASE_URL }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply release version
        run: |
          set -euo pipefail
          python3 - <<PY
          import json
          from pathlib import Path

          for filename in ("package.json", "package-lock.json"):
              path = Path(filename)
              data = json.loads(path.read_text())
              data["version"] = "$RELEASE_VERSION"
              if filename == "package-lock.json":
                  data["packages"][""]["version"] = "$RELEASE_VERSION"
              path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$RELEASE_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$RELEASE_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "threadfleet"\nversion = ")[^"]+(")',
            r'\g<1>$RELEASE_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update threadfleet version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

          python3 - <<PY
          import plistlib
          from pathlib import Path

          path = Path("src-tauri/gen/apple/codex-monitor_iOS/Info.plist")
          with path.open("rb") as f:
            data = plistlib.load(f)

          data["CFBundleShortVersionString"] = "$RELEASE_VERSION"
          data["CFBundleVersion"] = "$RELEASE_VERSION"

          with path.open("wb") as f:
            plistlib.dump(data, f, sort_keys=False)
          PY

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install CMake
        run: brew install cmake

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: |
          set -euo pipefail
          npm run tauri -- build --config src-tauri/tauri.macos.conf.json --target ${{ matrix.target }} --bundles app

      - name: Build daemon binaries
        run: |
          set -euo pipefail
          cd src-tauri
          cargo build --release --target ${{ matrix.target }} --bin codex_monitor_daemon --bin codex_monitor_daemonctl

      - name: Ad-hoc sign macOS app bundle
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/ThreadFleet.app"
          codesign \
            --force \
            --deep \
            --sign - \
            --timestamp=none \
            --entitlements src-tauri/Entitlements.plist \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package artifacts
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          mkdir -p release-artifacts release-artifacts/dmg-root
          rm -rf "release-artifacts/dmg-root/ThreadFleet.app"
          ditto "src-tauri/target/${{ matrix.target }}/release/bundle/macos/ThreadFleet.app" \
            "release-artifacts/dmg-root/ThreadFleet.app"
          ln -s /Applications "release-artifacts/dmg-root/Applications"
          cat > "release-artifacts/dmg-root/安装与打开说明.txt" <<'EOF'
          安装：将 ThreadFleet 拖入 Applications 文件夹。

          本版本未使用 Apple Developer ID 公证。首次打开时：
          1. 在“应用程序”中右键 ThreadFleet，选择“打开”。
          2. 如果仍被阻止，前往“系统设置 > 隐私与安全性”，点击“仍要打开”。

          正常情况下不需要执行终端命令。
          EOF

          ditto -c -k --keepParent \
            "src-tauri/target/${{ matrix.target }}/release/bundle/macos/ThreadFleet.app" \
            release-artifacts/ThreadFleet_${VERSION}_${{ matrix.arch }}.zip

          hdiutil create -volname "ThreadFleet" \
            -srcfolder release-artifacts/dmg-root \
            -ov -format UDZO \
            release-artifacts/ThreadFleet_${VERSION}_${{ matrix.arch }}.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts-${{ matrix.arch }}
          path: |
            release-artifacts/ThreadFleet_*_${{ matrix.arch }}.zip
            release-artifacts/ThreadFleet_*_${{ matrix.arch }}.dmg

  build_linux:
    name: linux bundles (${{ matrix.arch }})
    runs-on: ${{ matrix.platform }}
    needs: prepare_release
    environment: release
    env:
      RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
      VITE_TENCENT_UPDATE_MANIFEST_URL: ${{ vars.TENCENT_UPDATE_MANIFEST_URL }}
      VITE_ALIYUN_UPDATE_MANIFEST_URL: ${{ vars.ALIYUN_UPDATE_MANIFEST_URL }}
      THREADFLEET_TENCENT_UPDATE_BASE_URL: ${{ vars.TENCENT_UPDATE_BASE_URL }}
      THREADFLEET_ALIYUN_UPDATE_BASE_URL: ${{ vars.ALIYUN_UPDATE_BASE_URL }}
      VITE_TENCENT_CODEX_CLI_MANIFEST_URL: ${{ vars.TENCENT_CODEX_CLI_MANIFEST_URL }}
      VITE_ALIYUN_CODEX_CLI_MANIFEST_URL: ${{ vars.ALIYUN_CODEX_CLI_MANIFEST_URL }}
      THREADFLEET_TENCENT_CODEX_CLI_BASE_URL: ${{ vars.TENCENT_CODEX_CLI_BASE_URL }}
      THREADFLEET_ALIYUN_CODEX_CLI_BASE_URL: ${{ vars.ALIYUN_CODEX_CLI_BASE_URL }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            arch: x86_64
          - platform: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (linux only)
        run: |
          set -euo pipefail

          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            for source_file in /etc/apt/sources.list /etc/apt/sources.list.d/ubuntu.sources; do
              if [ -f "$source_file" ]; then
                sudo sed -i \
                  's|http://ports.ubuntu.com/ubuntu-ports|https://ports.ubuntu.com/ubuntu-ports|g' \
                  "$source_file"
              fi
            done
          fi

          apt_retry() {
            for attempt in 1 2 3; do
              if sudo env DEBIAN_FRONTEND=noninteractive apt-get \
                -o Acquire::ForceIPv4=true \
                -o Acquire::Retries=5 \
                "$@"; then
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                return 1
              fi
              sleep $((attempt * 10))
            done
          }

          apt_retry update
          apt_retry install -y cmake libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils libasound2-dev rpm

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Apply release version
        run: |
          set -euo pipefail
          python3 - <<PY
          import json
          from pathlib import Path

          for filename in ("package.json", "package-lock.json"):
              path = Path(filename)
              data = json.loads(path.read_text())
              data["version"] = "$RELEASE_VERSION"
              if filename == "package-lock.json":
                  data["packages"][""]["version"] = "$RELEASE_VERSION"
              path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$RELEASE_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$RELEASE_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "threadfleet"\nversion = ")[^"]+(")',
            r'\g<1>$RELEASE_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update threadfleet version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      - name: build AppImage and RPM
        run: |
          set -euo pipefail
          npm run tauri -- build --config src-tauri/tauri.linux.conf.json --bundles appimage,rpm

      - name: Validate Linux bundle outputs
        run: |
          set -euo pipefail
          mapfile -t appimages < <(find src-tauri/target/release/bundle/appimage -type f -name '*.AppImage*' | sort)
          mapfile -t rpms < <(find src-tauri/target/release/bundle/rpm -type f -name '*.rpm' | sort)
          if [ ${#appimages[@]} -eq 0 ]; then
            echo "No AppImage output found"
            exit 1
          fi
          if [ ${#rpms[@]} -eq 0 ]; then
            echo "No RPM output found"
            exit 1
          fi

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage*
            src-tauri/target/release/bundle/rpm/*.rpm

  build_windows:
    runs-on: windows-latest
    needs: prepare_release
    environment: release
    env:
      RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
      VITE_TENCENT_UPDATE_MANIFEST_URL: ${{ vars.TENCENT_UPDATE_MANIFEST_URL }}
      VITE_ALIYUN_UPDATE_MANIFEST_URL: ${{ vars.ALIYUN_UPDATE_MANIFEST_URL }}
      THREADFLEET_TENCENT_UPDATE_BASE_URL: ${{ vars.TENCENT_UPDATE_BASE_URL }}
      THREADFLEET_ALIYUN_UPDATE_BASE_URL: ${{ vars.ALIYUN_UPDATE_BASE_URL }}
      VITE_TENCENT_CODEX_CLI_MANIFEST_URL: ${{ vars.TENCENT_CODEX_CLI_MANIFEST_URL }}
      VITE_ALIYUN_CODEX_CLI_MANIFEST_URL: ${{ vars.ALIYUN_CODEX_CLI_MANIFEST_URL }}
      THREADFLEET_TENCENT_CODEX_CLI_BASE_URL: ${{ vars.TENCENT_CODEX_CLI_BASE_URL }}
      THREADFLEET_ALIYUN_CODEX_CLI_BASE_URL: ${{ vars.ALIYUN_CODEX_CLI_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Apply release version
        shell: bash
        run: |
          set -euo pipefail
          python - <<PY
          import json
          from pathlib import Path

          for filename in ("package.json", "package-lock.json"):
              path = Path(filename)
              data = json.loads(path.read_text())
              data["version"] = "$RELEASE_VERSION"
              if filename == "package-lock.json":
                  data["packages"][""]["version"] = "$RELEASE_VERSION"
              path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$RELEASE_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$RELEASE_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "threadfleet"\nversion = ")[^"]+(")',
            r'\g<1>$RELEASE_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update threadfleet version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install LLVM (bindgen)
        run: choco install llvm -y --no-progress

      - name: Configure LLVM (bindgen)
        run: |
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_ENV
          echo "C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_PATH

      - name: install frontend dependencies
        run: npm ci

      - name: build windows bundles
        shell: bash
        run: |
          set -euo pipefail
          npm run tauri:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe*
            src-tauri/target/release/bundle/nsis/*.zip*
            src-tauri/target/release/bundle/msi/*.msi*
            src-tauri/target/release/bundle/msi/*.zip*

  release:
    runs-on: ubuntu-latest
    environment: release
    needs:
      - prepare_release
      - build_macos
      - build_linux
      - build_windows
    env:
      RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
      RELEASE_LABEL_VERSION: ${{ needs.prepare_release.outputs.release_label_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply release version
        run: |
          set -euo pipefail
          python3 - <<PY
          import json
          from pathlib import Path

          for filename in ("package.json", "package-lock.json"):
              path = Path(filename)
              data = json.loads(path.read_text())
              data["version"] = "$RELEASE_VERSION"
              if filename == "package-lock.json":
                  data["packages"][""]["version"] = "$RELEASE_VERSION"
              path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$RELEASE_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$RELEASE_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "threadfleet"\nversion = ")[^"]+(")',
            r'\g<1>$RELEASE_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update threadfleet version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

          python3 - <<PY
          import plistlib
          from pathlib import Path

          path = Path("src-tauri/gen/apple/codex-monitor_iOS/Info.plist")
          with path.open("rb") as f:
            data = plistlib.load(f)

          data["CFBundleShortVersionString"] = "$RELEASE_VERSION"
          data["CFBundleVersion"] = "$RELEASE_VERSION"

          with path.open("wb") as f:
            plistlib.dump(data, f, sort_keys=False)
          PY

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Download Linux bundles
        uses: actions/download-artifact@v4
        with:
          pattern: linux-bundles-*
          path: release-artifacts
          merge-multiple: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts

      - name: Normalize release artifact filenames
        run: |
          set -euo pipefail
          while IFS= read -r -d '' artifact; do
            dir=$(dirname "$artifact")
            file=$(basename "$artifact")
            normalized="${file// /.}"
            normalized="${normalized//${RELEASE_VERSION}/${RELEASE_LABEL_VERSION}}"
            if [ "$file" = "$normalized" ]; then
              continue
            fi
            target="${dir}/${normalized}"
            if [ -e "$target" ]; then
              echo "Cannot normalize filename because target already exists: $target"
              exit 1
            fi
            echo "Renaming $artifact -> $target"
            mv "$artifact" "$target"
          done < <(find release-artifacts -type f -name '* *' -print0)

      - name: Validate RPM artifacts
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rpm
          mapfile -t rpms < <(find release-artifacts -type f -name '*.rpm' | sort)
          if [ ${#rpms[@]} -eq 0 ]; then
            echo "No RPM artifacts found"
            find release-artifacts -type f | sort
            exit 1
          fi
          for rpm_file in "${rpms[@]}"; do
            rpm -qip "$rpm_file"
            rpm -qp --requires "$rpm_file"
          done

      - name: Build release notes
        run: |
          set -euo pipefail
          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -v "^v${RELEASE_LABEL_VERSION}$" \
            | head -n 1 || true)
          RANGE_END="${GITHUB_SHA}"
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          else
            git log "${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          fi

          python3 scripts/build_release_notes.py \
            --artifacts-dir release-artifacts \
            --repository "$GITHUB_REPOSITORY" \
            --version "$RELEASE_LABEL_VERSION" \
            --commits-file release-artifacts/release-commits.txt \
            --output release-artifacts/release-notes.md

      - name: Build update mirror payloads
        env:
          TENCENT_UPDATE_BASE_URL: ${{ vars.TENCENT_UPDATE_BASE_URL }}
          ALIYUN_UPDATE_BASE_URL: ${{ vars.ALIYUN_UPDATE_BASE_URL }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import shutil
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          release_label_version = os.environ["RELEASE_LABEL_VERSION"]
          notes = Path("release-artifacts/release-notes.md").read_text()
          excluded = (".sig", ".zip", ".blockmap")
          artifacts = [
              path for path in Path("release-artifacts").rglob("*")
              if path.is_file()
              and not path.name.endswith(excluded)
              and path.suffix.lower() in {".msi", ".exe", ".dmg", ".appimage", ".rpm"}
          ]
          for provider, env_name in (
              ("tencent", "TENCENT_UPDATE_BASE_URL"),
              ("aliyun", "ALIYUN_UPDATE_BASE_URL"),
          ):
              base_url = os.environ.get(env_name, "").strip().rstrip("/")
              if not base_url:
                  continue
              root = Path("update-mirrors") / provider
              version_dir = root / f"v{release_label_version}"
              version_dir.mkdir(parents=True, exist_ok=True)
              assets = []
              for artifact in artifacts:
                  target = version_dir / artifact.name
                  shutil.copy2(artifact, target)
                  digest = hashlib.sha256(target.read_bytes()).hexdigest()
                  assets.append({
                      "name": artifact.name,
                      "size": target.stat().st_size,
                      "sha256": digest,
                      "url": f"{base_url}/v{release_label_version}/{artifact.name}",
                  })
              manifest = {
                  "version": version,
                  "htmlUrl": f"https://github.com/wzxmer/ThreadFleet/releases/tag/v{release_label_version}",
                  "body": notes,
                  "assets": assets,
              }
              (root / "latest.json").write_text(
                  json.dumps(manifest, ensure_ascii=False, indent=2) + "\n"
              )
          PY

      - name: Prepare managed Codex CLI packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TENCENT_CODEX_CLI_BASE_URL: ${{ vars.TENCENT_CODEX_CLI_BASE_URL }}
          ALIYUN_CODEX_CLI_BASE_URL: ${{ vars.ALIYUN_CODEX_CLI_BASE_URL }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import io
          import json
          import os
          import tarfile
          import urllib.request
          import zipfile
          from pathlib import Path

          request = urllib.request.Request(
              "https://api.github.com/repos/openai/codex/releases/latest",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "User-Agent": "ThreadFleet-release",
              },
          )
          with urllib.request.urlopen(request) as response:
              release = json.load(response)
          codex_version = str(release["tag_name"]).removeprefix("rust-v").lstrip("v")
          assets = release.get("assets", [])
          targets = {
              "windows-x86_64": "x86_64-pc-windows-msvc",
              "windows-aarch64": "aarch64-pc-windows-msvc",
              "macos-x86_64": "x86_64-apple-darwin",
              "macos-aarch64": "aarch64-apple-darwin",
              "linux-x86_64": "x86_64-unknown-linux-musl",
              "linux-aarch64": "aarch64-unknown-linux-musl",
          }
          output_dir = Path("release-artifacts/codex-cli-packages")
          output_dir.mkdir(parents=True, exist_ok=True)
          packages = {}
          cm_version = os.environ["RELEASE_VERSION"]
          release_label_version = os.environ["RELEASE_LABEL_VERSION"]
          github_base = f"https://github.com/wzxmer/ThreadFleet/releases/download/v{release_label_version}"
          mirror_bases = [
              os.environ.get("TENCENT_CODEX_CLI_BASE_URL", "").strip().rstrip("/"),
              os.environ.get("ALIYUN_CODEX_CLI_BASE_URL", "").strip().rstrip("/"),
          ]

          for platform, target in targets.items():
              expected_asset_name = f"codex-package-{target}.tar.gz"
              candidates = [asset for asset in assets if asset["name"] == expected_asset_name]
              if not candidates:
                  print(f"Skipping unavailable Codex target: {target}")
                  continue
              asset = candidates[0]
              download = urllib.request.Request(
                  asset["browser_download_url"],
                  headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "User-Agent": "ThreadFleet-release"},
              )
              with urllib.request.urlopen(download) as response:
                  archive_bytes = response.read()
              file_name = f"codex-cli-{codex_version}-{platform}.zip"
              package_path = output_dir / file_name
              with zipfile.ZipFile(package_path, "w", compression=zipfile.ZIP_DEFLATED, compresslevel=9) as archive:
                  with tarfile.open(fileobj=io.BytesIO(archive_bytes), mode="r:gz") as source:
                      for member in source.getmembers():
                          if not member.isfile():
                              continue
                          relative = Path(member.name)
                          if relative.is_absolute() or ".." in relative.parts:
                              raise RuntimeError(f"Unsafe Codex package path: {member.name}")
                          extracted = source.extractfile(member)
                          info = zipfile.ZipInfo(relative.as_posix())
                          info.external_attr = (member.mode & 0xFFFF) << 16
                          archive.writestr(info, extracted.read(), compress_type=zipfile.ZIP_DEFLATED, compresslevel=9)
              urls = [f"{base}/{file_name}" for base in mirror_bases if base]
              urls.append(f"{github_base}/{file_name}")
              packages[platform] = {
                  "fileName": file_name,
                  "urls": urls,
                  "size": package_path.stat().st_size,
                  "sha256": hashlib.sha256(package_path.read_bytes()).hexdigest(),
              }

          manifest = {"version": codex_version, "packages": packages}
          Path("release-artifacts/codex-cli-latest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n"
          )
          PY

          for provider in tencent aliyun; do
            mkdir -p "update-mirrors/${provider}"
            if [ -d "update-mirrors/${provider}" ]; then
              cp release-artifacts/codex-cli-latest.json "update-mirrors/${provider}/"
              cp release-artifacts/codex-cli-packages/*.zip "update-mirrors/${provider}/"
            fi
          done

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          appimages=(release-artifacts/**/*.AppImage*)
          mapfile -t rpms < <(find release-artifacts -type f -name '*.rpm' | sort)
          mapfile -t windows_exes < <(find release-artifacts -type f -name '*.exe*' | sort)
          mapfile -t windows_msis < <(find release-artifacts -type f -name '*.msi*' | sort)
          if [ ${#rpms[@]} -eq 0 ]; then
            echo "No RPM artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          if [ ${#windows_exes[@]} -eq 0 ]; then
            echo "No Windows .exe artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          if [ ${#windows_msis[@]} -eq 0 ]; then
            echo "No Windows .msi artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi

          gh release create "v${RELEASE_LABEL_VERSION}" \
            --title "v${RELEASE_LABEL_VERSION}" \
            --notes-file release-artifacts/release-notes.md \
            --target "$GITHUB_SHA" \
            release-artifacts/ThreadFleet_*_*.zip \
            release-artifacts/ThreadFleet_*_*.dmg \
            release-artifacts/codex-cli-latest.json \
            release-artifacts/codex-cli-packages/*.zip \
            "${appimages[@]}" \
            "${rpms[@]}" \
            "${windows_exes[@]}" \
            "${windows_msis[@]}"

      - name: Upload Tencent COS mirror
        if: ${{ vars.TENCENT_COS_BUCKET != '' && vars.TENCENT_COS_REGION != '' }}
        env:
          SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          BUCKET: ${{ vars.TENCENT_COS_BUCKET }}
          REGION: ${{ vars.TENCENT_COS_REGION }}
        run: |
          set -euo pipefail
          if [ -z "$SECRET_ID" ] || [ -z "$SECRET_KEY" ] || [ ! -d update-mirrors/tencent ]; then
            echo "Tencent COS mirror is not fully configured; skipping."
            exit 0
          fi
          pip install coscmd
          coscmd config -a "$SECRET_ID" -s "$SECRET_KEY" -b "$BUCKET" -r "$REGION"
          coscmd upload -rs update-mirrors/tencent/ /

      - name: Upload Aliyun OSS mirror
        if: ${{ vars.ALIYUN_OSS_BUCKET != '' && vars.ALIYUN_OSS_ENDPOINT != '' }}
        env:
          ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
        run: |
          set -euo pipefail
          if [ -z "$ACCESS_KEY_ID" ] || [ -z "$ACCESS_KEY_SECRET" ] || [ ! -d update-mirrors/aliyun ]; then
            echo "Aliyun OSS mirror is not fully configured; skipping."
            exit 0
          fi
          curl -fsSLo ossutil.zip \
            https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip
          unzip -q ossutil.zip -d ossutil-bin
          OSSUTIL=$(find ossutil-bin -type f -name ossutil -print -quit)
          chmod +x "$OSSUTIL"
          "$OSSUTIL" cp -rf update-mirrors/aliyun/ "oss://${BUCKET}/" \
            -e "$ENDPOINT" -i "$ACCESS_KEY_ID" -k "$ACCESS_KEY_SECRET"

