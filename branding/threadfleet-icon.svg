<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ThreadFleet application icon</title>
  <desc id="desc">Three luminous task routes converge into a forward fleet formation.</desc>
  <defs>
    <linearGradient id="background" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111C35"/>
      <stop offset="0.55" stop-color="#0B1327"/>
      <stop offset="1" stop-color="#070C18"/>
    </linearGradient>
    <linearGradient id="routeTop" x1="210" y1="300" x2="790" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#42D8FF"/>
      <stop offset="1" stop-color="#5B8CFF"/>
    </linearGradient>
    <linearGradient id="routeMid" x1="210" y1="512" x2="824" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#69F0D0"/>
      <stop offset="1" stop-color="#42D8FF"/>
    </linearGradient>
    <linearGradient id="routeBottom" x1="210" y1="724" x2="790" y2="524" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB45D"/>
      <stop offset="1" stop-color="#FF6F91"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="220" fill="url(#background)"/>
  <rect x="48" y="48" width="928" height="928" rx="204" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="8"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M224 304H372C430 304 463 339 498 381L602 506" stroke="url(#routeTop)" stroke-width="72"/>
    <path d="M224 512H648" stroke="url(#routeMid)" stroke-width="72"/>
    <path d="M224 720H372C430 720 463 685 498 643L602 518" stroke="url(#routeBottom)" stroke-width="72"/>
  </g>

  <g fill="#F7FAFF">
    <path d="M620 374L842 487C862 497 862 527 842 537L620 650C600 660 576 645 576 622V402C576 379 600 364 620 374Z"/>
    <circle cx="224" cy="304" r="44"/>
    <circle cx="224" cy="512" r="44"/>
    <circle cx="224" cy="720" r="44"/>
  </g>
</svg>
